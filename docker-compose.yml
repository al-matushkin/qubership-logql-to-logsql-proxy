services:
  logql-proxy:
    build: .
    ports:
      - "3100:3100"
    environment:
      PROXY_VLOGS_URL: http://victorialogs:9428
      PROXY_LIMITS_MAXMEMORYMB: "512"
    depends_on:
      - victorialogs
    restart: unless-stopped

  victorialogs:
    image: victoriametrics/victoria-logs:latest
    ports:
      - "9428:9428"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_FEATURE_TOGGLES_ENABLE: "logsExplore"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      - logql-proxy
    restart: unless-stopped

volumes:
  grafana-data:
