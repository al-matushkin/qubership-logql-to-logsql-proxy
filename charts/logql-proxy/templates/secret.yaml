{{/*
  Only create a Secret when:
    - No existingSecret is referenced (we don't manage external secrets), AND
    - At least one credential value is provided inline.
*/}}
{{- if and (not .Values.proxy.vlogs.existingSecret)
           (or .Values.proxy.vlogs.bearerToken
               .Values.proxy.vlogs.basicAuth.password) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "logql-proxy.fullname" . }}-credentials
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "logql-proxy.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.proxy.vlogs.bearerToken }}
  bearer-token: {{ .Values.proxy.vlogs.bearerToken | quote }}
  {{- end }}
  {{- if .Values.proxy.vlogs.basicAuth.username }}
  basic-auth-username: {{ .Values.proxy.vlogs.basicAuth.username | quote }}
  {{- end }}
  {{- if .Values.proxy.vlogs.basicAuth.password }}
  basic-auth-password: {{ .Values.proxy.vlogs.basicAuth.password | quote }}
  {{- end }}
{{- end }}
