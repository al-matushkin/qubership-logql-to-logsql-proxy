{{- if .Values.httpRoute.enabled -}}
{{- $fullName := include "logql-proxy.fullname" . -}}
{{- $svcPort := .Values.service.port -}}
# Requires the Kubernetes Gateway API CRDs (v1 — stable since Gateway API 1.0 / k8s 1.28).
# Install them with:
#   kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/latest/download/standard-install.yaml
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "logql-proxy.labels" . | nindent 4 }}
  {{- with .Values.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  # ── Parent gateways this route attaches to ──────────────────────────────────
  parentRefs:
    {{- range .Values.httpRoute.parentRefs }}
    - name: {{ .name | quote }}
      {{- if .namespace }}
      namespace: {{ .namespace | quote }}
      {{- end }}
      {{- if .sectionName }}
      sectionName: {{ .sectionName | quote }}
      {{- end }}
    {{- end }}
  # ── Hostnames this route matches ────────────────────────────────────────────
  {{- if .Values.httpRoute.hostnames }}
  hostnames:
    {{- range .Values.httpRoute.hostnames }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}
  # ── Rules ───────────────────────────────────────────────────────────────────
  rules:
    # Prepend any additional rules defined in values (e.g. redirect HTTP→HTTPS).
    {{- with .Values.httpRoute.additionalRules }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    # Default catch-all rule: forward all traffic to the proxy service.
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ $fullName }}
          port: {{ $svcPort }}
{{- end }}
